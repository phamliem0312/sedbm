<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programme — SEDBM 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Page Header -->
    <div class="page-header">
        <h1>Programme</h1>
        <p>Conference schedule and detailed programme</p>
    </div>

    <!-- Content -->
    <section class="page-content" style="background: var(--neutral-50);">
        <div class="container">
            <div class="content-card" data-aos="fade-up" style="text-align: center;">
                <h3><i class="fas fa-calendar-alt" style="color: var(--primary-500); margin-right: 10px;"></i> Conference Programme</h3>
                <div style="margin: 40px auto; max-width: 520px;">
                    <div style="display: inline-flex; align-items: center; justify-content: center; gap: 12px; padding: 16px 28px; background: linear-gradient(135deg, var(--accent-100), var(--accent-200)); border-radius: var(--radius-md);">
                        <i class="fas fa-hourglass-half" style="color: var(--accent-600); font-size: 1.4rem;"></i>
                        <strong style="color: var(--primary-900); font-size: 1.1rem;">Updating</strong>
                    </div>
                    <p style="margin-top: 24px; color: var(--neutral-600);">
                        The detailed programme for SEDBM 2026 is currently being finalised by the organising committee
                        and will be published closer to the conference date.
                    </p>
                </div>
                <div class="highlight-box" style="margin-top: 28px; text-align: left;">
                    <p>
                        <i class="fas fa-envelope" style="margin-right: 8px;"></i>
                        For programme enquiries, please contact
                        <a href="mailto:aof_sedbm@hvtc.edu.vn">aof_sedbm@hvtc.edu.vn</a>.
                    </p>
                </div>
            </div>
        </div>
    </section>
    <script src="js/embed-bridge.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
