<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration — SEDBM 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <section class="page-content section-bg-neutral">
        <div class="container">
            <div class="content-card" data-aos="fade-up">
                <h3><i class="fas fa-info-circle icon-lead"></i> Registration Has Been Moved</h3>
                <p>
                    Registration information is now part of the unified
                    <strong>Submission &amp; Registration</strong> page.
                </p>
                <p>
                    If you are not redirected automatically, please continue here:
                    <a href="index.html#submission.html|registration-information">Submission &amp; Registration</a>
                </p>
            </div>
        </div>
    </section>
    <script>
    (function () {
        const targetHash = '#submission.html|registration-information';
        const isShellPage = /\/(?:index\.html)?$/i.test(globalThis.location.pathname);

        if (isShellPage) {
            if (globalThis.location.hash !== targetHash) {
                globalThis.location.hash = targetHash;
            }
            return;
        }

        globalThis.location.replace(`index.html${targetHash}`);
    })();
    </script>
</body>
</html>
